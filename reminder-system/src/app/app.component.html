
<div class="container">
  <h2>Add New Reminder</h2>
  <form [formGroup]="reminderForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <input type="text" formControlName="subject" placeholder="Subject" />
    </div>
    <div class="form-group">
      <textarea formControlName="content" placeholder="Content"></textarea>
    </div>
    <div class="form-group">
      <input type="datetime-local" formControlName="dateTime" />
    </div>
    <button type="submit" [disabled]="reminderForm.invalid">Add Reminder</button>
  </form>

  <hr />

  <h3>Upcoming Reminders</h3>
  
  <div class="reminder-list">
    @for (item of reminders; track item.id; let i = $index) {
      <div class="reminder-card">
        <h4>{{ i + 1 }}. {{ item.subject }}</h4>
        <p>{{ item.content }}</p>
        <small>Scheduled for: {{ item.dateTime | date:'medium' }}</small>
        <br />
        <button (click)="delete(item.id)" class="delete-btn">Delete</button>
      </div>
    } @empty {
      <p>No reminders scheduled yet. Add one above!</p>
    }
  </div>
</div>
